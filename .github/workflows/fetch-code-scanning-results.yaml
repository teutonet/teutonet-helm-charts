name: Fetch Code Scanning Results

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch: {}

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: read
    steps:
      - name: Fetch code scanning alerts
        id: fetch-alerts
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_BOT_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          [[ "$RUNNER_DEBUG" == 1 ]] && set -x
          set -e
          set -o pipefail

          # Fetch all code scanning alerts
          echo "Fetching code scanning alerts..."
          gh api --paginate "/repos/${GH_REPO}/code-scanning/alerts" > all_alerts.json

          # Separate open and closed alerts
          jq '[.[] | select(.state == "open")]' all_alerts.json > open_alerts.json
          jq '[.[] | select(.state != "open")]' all_alerts.json > closed_alerts.json

          echo "Found $(jq length open_alerts.json) open alerts"
          echo "Found $(jq length closed_alerts.json) closed alerts"

      - name: Generate markdown for open alerts
        run: |
          [[ "$RUNNER_DEBUG" == 1 ]] && set -x
          set -e
          set -o pipefail

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          OPEN_COUNT=$(jq length open_alerts.json)

          {
            cat << EOF
          # Open Code Scanning Alerts

          This file is automatically generated daily from the GitHub Code Scanning API.

          **Last Updated:** ${TIMESTAMP}

          **Total Open Alerts:** ${OPEN_COUNT}

          EOF

            if [ "${OPEN_COUNT}" -eq 0 ]; then
              echo ""
              echo "✅ No open code scanning alerts found!"
            else
              echo ""
              echo "| Severity | Rule | Message | Path | State | Created | URL |"
              echo "|----------|------|---------|------|-------|---------|-----|"
              
              jq -r '.[] | "| \(.rule.severity // "unknown") | `\(.rule.id)` | \(.rule.description // "N/A") | `\(.most_recent_instance.location.path // "N/A")` | \(.state) | \(.created_at) | [\(.number)](\(.html_url)) |"' open_alerts.json
            fi
          } > open-alerts.md

      - name: Generate markdown for closed alerts
        run: |
          [[ "$RUNNER_DEBUG" == 1 ]] && set -x
          set -e
          set -o pipefail

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          CLOSED_COUNT=$(jq length closed_alerts.json)

          {
            cat << EOF
          # Closed Code Scanning Alerts

          This file is automatically generated daily from the GitHub Code Scanning API.

          **Last Updated:** ${TIMESTAMP}

          **Total Closed Alerts:** ${CLOSED_COUNT}

          EOF

            if [ "${CLOSED_COUNT}" -eq 0 ]; then
              echo ""
              echo "✅ No closed code scanning alerts found!"
            else
              echo ""
              echo "| Severity | Rule | Message | Path | State | Created | Closed | URL |"
              echo "|----------|------|---------|------|-------|---------|--------|-----|"
              
              jq -r '.[] | "| \(.rule.severity // "unknown") | `\(.rule.id)` | \(.rule.description // "N/A") | `\(.most_recent_instance.location.path // "N/A")` | \(.state) | \(.created_at) | \(.dismissed_at // .fixed_at // "N/A") | [\(.number)](\(.html_url)) |"' closed_alerts.json
            fi
          } > closed-alerts.md

      - name: Push to code-scanning branch
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_BOT_TOKEN }}
        run: |
          [[ "$RUNNER_DEBUG" == 1 ]] && set -x
          set -e
          set -o pipefail

          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the repository to a temporary directory
          TEMP_DIR=$(mktemp -d)
          cd "${TEMP_DIR}"
          
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          
          # Check if code-scanning branch exists
          if git ls-remote --heads origin code-scanning | grep -q code-scanning; then
            echo "Branch code-scanning exists, checking out..."
            git fetch origin code-scanning
            git checkout code-scanning
            # Remove all existing files (but keep .git)
            find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          else
            echo "Creating new orphan branch code-scanning..."
            git checkout --orphan code-scanning
            # Remove all files from staging
            git rm -rf . 2>/dev/null || true
            # Clean working directory
            find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          fi

          # Copy markdown files from GitHub Actions workspace
          cp "${GITHUB_WORKSPACE}/open-alerts.md" .
          cp "${GITHUB_WORKSPACE}/closed-alerts.md" .
          
          # Add only the markdown files
          git add open-alerts.md closed-alerts.md

          # Commit and push
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: Update code scanning results - $(date -u +"%Y-%m-%d")"
            git push origin code-scanning
          fi
