{{- $cloud := lookup "t8s-engine.teuto.net/v1beta1" "TeutonetesCloud" "" .Values.cloud -}}

{{- if not $cloud -}}
  {{/* Only fail in real life, not during testing */}}
  {{- if ne .Release.Namespace "default" -}}
    {{- fail (printf "Cloud %s not found" .Values.cloud) -}}
  {{- end -}}
{{- else -}}
  {{- $defaultClass := $cloud.spec.volumeTypes.default -}}

  {{- $storageClasses := list -}}

  {{- range $name, $type := $cloud.spec.volumeTypes.types }}
    {{- $storageClasses = append $storageClasses (include "t8s-cluster.storageclass" (dict "name" $name "type" $type "default" (eq $defaultClass $name))) -}}
  {{- end -}}

  {{- include "t8s-cluster.helm.resourceIntoCluster" (dict "name" "storageclasses" "resource" ($storageClasses | join "\n---\n") "context" $ "additionalLabels" (dict "app.kubernetes.io/component" "storage")) | nindent 0 -}}
{{- end -}}

{{- define "t8s-cluster.storageclass" -}}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ printf "teutostack-%s" .name }}
  labels: {{- include "common.helm.labels" (dict) | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- if .default }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  {{- end }}
allowVolumeExpansion: true
parameters:
  availability: nova
  type: {{ .type }}
provisioner: cinder.csi.openstack.org
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
{{- end -}}
