{{- if eq (include "t8s-cluster.hasGPUNodes" (dict "context" $)) "true" }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ printf "%s-gpu-operator" .Release.Name }}
  namespace: {{ .Release.Namespace}}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
spec:
  chart:
    spec: {{- include "common.helm.chartSpec" (dict "repo" "nvidia" "repoNamespace" "flux-system" "chart" "gpu-operator" "context" $) | nindent 6 }}
  interval: 1h
  driftDetection:
    mode: enabled
  kubeConfig:
    secretRef:
      name: {{ .Release.Name }}-kubeconfig
  install:
    remediation:
      retries: -1
  uninstall:
    disableWait: true
  upgrade:
    timeout: 5m
    crds: CreateReplace
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: gpu-operator
            patch: |
              - op: add
                path: /spec/template/spec/securityContext
                value:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
              - op: add
                path: /spec/template/spec/containers/0/securityContext
                value:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  runAsNonRoot: true
                  runAsGroup: 1000
          - target:
              kind: Job
              name: gpu-operator-upgrade-crd
            patch: |
              - op: add
                path: /spec/template/spec/securityContext
                value:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
              - op: add
                path: /spec/template/spec/containers/0/securityContext
                value:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  runAsNonRoot: true
                  runAsGroup: 1000
          - target:
              kind: Deployment
              name: gpu-operator-node-feature-discovery-master
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/securityContext/runAsGroup
                value: 1000
          - target:
              kind: Deployment
              name: gpu-operator-node-feature-discovery-gc
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/securityContext/runAsGroup
                value: 1000
          - target:
              kind: DaemonSet
              name: gpu-operator-node-feature-discovery-worker
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/securityContext/runAsGroup
                value: 1000
          - target:
              kind: Job
              name: gpu-operator-node-feature-discovery-prune
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/securityContext/runAsGroup
                value: 1000
  storageNamespace: kube-system
  targetNamespace: kube-system
  releaseName: gpu-operator
  values:
    devicePlugin:
      config:
        create: true
        name: gpu-operator-time-slicing
        default: any
        data:
          any: |-
            version: v1
            sharing:
              timeSlicing:
                failRequestsGreaterThanOne: false
                resources:
                  - name: nvidia.com/gpu
                    replicas: 4
    node-feature-discovery:
      worker:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node.kubernetes.io/instance-type
                      operator: In
                      {{- $gpuFlavours := list }}
                      {{- range $_, $machineDeploymentClass := .Values.nodePools -}}
                        {{- if contains "gpu" (lower $machineDeploymentClass.flavor) -}}
                          {{- $gpuFlavours = append $gpuFlavours $machineDeploymentClass.flavor -}}
                        {{- end -}}
                      {{- end }}
                      values: {{- toYaml $gpuFlavours | nindent 24 }}
{{- end }}
