suite: ingress provider switch and IP guards
templates:
  - templates/ingress/validation.tpl
release:
  name: base-cluster
tests:
  - it: no error with default traefik and no existing nginx
    asserts:
      - hasDocuments:
          count: 0

  - it: no error with nginx provider and no existing traefik
    set:
      ingress.provider: nginx
    asserts:
      - hasDocuments:
          count: 0

  - it: fails immediately when nginx snippets enabled with traefik
    set:
      ingress.allowNginxConfigurationSnippets: true
    asserts:
      - failedTemplate:
          errorMessage: "allowNginxConfigurationSnippets cannot be enabled when using traefik as the ingress provider"

  - it: fails immediately when nginx traefik compatibility enabled with nginx
    set:
      ingress.provider: nginx
      ingress.useTraefikNginxCompatibility: true
    asserts:
      - failedTemplate:
          errorMessage: "useTraefikNginxCompatibility cannot be enabled when using nginx as the ingress provider"

  - it: fails when switching to traefik while nginx HelmRelease exists
    kubernetesProvider:
      scheme:
        "helm.toolkit.fluxcd.io/v2/HelmRelease":
          gvr:
            group: "helm.toolkit.fluxcd.io"
            version: "v2"
            resource: "helmreleases"
          namespaced: true
      objects:
        - apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: ingress-nginx
            namespace: ingress-nginx
    asserts:
      - failedTemplate:
          errorMessage: "Cannot switch to traefik while nginx is installed. If you want to switch to traefik, please delete the HelmRelease 'ingress-nginx/ingress-nginx' first. Note: You might want to set .Values.ingress.IP to the current nginx LoadBalancer IP to keep the same IP. Warning: Switching providers will cause downtime until the new provider is fully deployed."

  - it: fails when switching to nginx while traefik HelmRelease exists
    set:
      ingress.provider: nginx
    kubernetesProvider:
      scheme:
        "helm.toolkit.fluxcd.io/v2/HelmRelease":
          gvr:
            group: "helm.toolkit.fluxcd.io"
            version: "v2"
            resource: "helmreleases"
          namespaced: true
      objects:
        - apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: ingress-controller
            namespace: ingress
    asserts:
      - failedTemplate:
          errorMessage: "Cannot switch to nginx while traefik is installed. If you want to switch to nginx, please delete the HelmRelease 'ingress/ingress-controller' first. Note: You might want to set .Values.ingress.IP to the current traefik LoadBalancer IP to keep the same IP. Warning: Switching providers will cause downtime until the new provider is fully deployed."

  - it: fails when desired IP differs from existing service loadBalancerIP
    set:
      ingress.IP: 10.0.0.100
    kubernetesProvider:
      scheme:
        "v1/Service":
          gvr:
            version: "v1"
            resource: "services"
          namespaced: true
      objects:
        - apiVersion: v1
          kind: Service
          metadata:
            name: ingress-controller
            namespace: ingress
          spec:
            loadBalancerIP: 10.0.0.200
    asserts:
      - failedTemplate:
          errorMessage: "You cannot change the LoadBalancerIP on an existing service, if you really want to, please delete the service 'ingress/ingress-controller' beforehand"

  - it: no error when desired IP matches existing service loadBalancerIP
    set:
      ingress.IP: 10.0.0.100
    kubernetesProvider:
      scheme:
        "v1/Service":
          gvr:
            version: "v1"
            resource: "services"
          namespaced: true
      objects:
        - apiVersion: v1
          kind: Service
          metadata:
            name: ingress-controller
            namespace: ingress
          spec:
            loadBalancerIP: 10.0.0.100
    asserts:
      - hasDocuments:
          count: 0
