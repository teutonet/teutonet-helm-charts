suite: namespace PSS label generation
templates:
  - templates/global/namespaces.yaml
release:
  name: base-cluster
set:
  global.namespaces.myns.additionalLabels.test-target: "true"
tests:
  - it: adds warn and audit labels by default, no enforce label
    asserts:
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/warn"]
          value: restricted
        documentSelector:
          path: metadata.labels.test-target
          value: "true"
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/audit"]
          value: restricted
        documentSelector:
          path: metadata.labels.test-target
          value: "true"
      - notExists:
          path: metadata.labels["pod-security.kubernetes.io/enforce"]
        documentSelector:
          path: metadata.labels.test-target
          value: "true"

  - it: adds enforce label when enforce is set to restricted
    set:
      global.namespaces.myns.podSecurityStandards.enforce: restricted
    asserts:
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/enforce"]
          value: restricted
        documentSelector:
          path: metadata.labels.test-target
          value: "true"

  - it: omits warn label when warn is set to none
    set:
      global.namespaces.myns.podSecurityStandards.warn: none
    asserts:
      - notExists:
          path: metadata.labels["pod-security.kubernetes.io/warn"]
        documentSelector:
          path: metadata.labels.test-target
          value: "true"

  - it: rejects blacklisted system namespaces
    set:
      global.namespaces.kube-system.podSecurityStandards.enforce: restricted
    asserts:
      - failedTemplate:
          errorMessage: "Using namespace 'kube-system' is not allowed"

  - it: LimitRange uses hardcoded defaultRequest when no resources configured
    asserts:
      - isKind:
          of: LimitRange
        documentSelector:
          path: metadata.namespace
          value: myns
      - equal:
          path: spec.limits[0].defaultRequest
          value:
            cpu: 100m
            memory: 100Mi
        documentSelector:
          path: metadata.namespace
          value: myns
      - notExists:
          path: spec.limits[0].default
        documentSelector:
          path: metadata.namespace
          value: myns

  - it: LimitRange applies custom defaults.requests and defaults.limits
    values:
      - fixtures/namespace-resources-defaults.yaml
    asserts:
      - isKind:
          of: LimitRange
        documentSelector:
          path: metadata.namespace
          value: myns
      - equal:
          path: spec.limits[0].defaultRequest
          value:
            cpu: 77m
            memory: 123Mi
        documentSelector:
          path: metadata.namespace
          value: myns
      - equal:
          path: spec.limits[0].default
          value:
            cpu: 456m
            memory: 234Mi
        documentSelector:
          path: metadata.namespace
          value: myns

  - it: ResourceQuota renders when quotas configured
    values:
      - fixtures/namespace-resources-quotas.yaml
    asserts:
      - isKind:
          of: ResourceQuota
        documentSelector:
          path: spec.hard["limits.cpu"]
          value: "42"
      - equal:
          path: spec.hard
          value:
            limits.cpu: "42"
            limits.memory: 7Gi
        documentSelector:
          path: spec.hard["limits.cpu"]
          value: "42"

  - it: no ResourceQuota when resources configured without quotas
    values:
      - fixtures/namespace-resources-defaults.yaml
    asserts:
      - isKind:
          of: LimitRange
        documentSelector:
          path: metadata.namespace
          value: myns
