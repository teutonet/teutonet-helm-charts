suite: imagePullSecrets required field guards
templates:
  - templates/global/imagePullSecrets.yaml
release:
  name: base-cluster
tests:
  - it: no output when no imageCredentials configured
    asserts:
      - hasDocuments:
          count: 0

  - it: renders Secret when all fields provided
    set:
      global.imageCredentials.myreg.host: docker.io
      global.imageCredentials.myreg.username: myuser
      global.imageCredentials.myreg.password: mypass
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: fails when host is empty
    set:
      global.imageCredentials.myreg.host: ""
      global.imageCredentials.myreg.username: myuser
      global.imageCredentials.myreg.password: mypass
    asserts:
      - failedTemplate:
          errorMessage: "You must specify a registry host"

  - it: fails when username is empty
    set:
      global.imageCredentials.myreg.host: docker.io
      global.imageCredentials.myreg.username: ""
      global.imageCredentials.myreg.password: mypass
    asserts:
      - failedTemplate:
          errorMessage: "You must specify a registry username"

  - it: fails when password is empty
    set:
      global.imageCredentials.myreg.host: docker.io
      global.imageCredentials.myreg.username: myuser
      global.imageCredentials.myreg.password: ""
    asserts:
      - failedTemplate:
          errorMessage: "You must specify a registry password"
