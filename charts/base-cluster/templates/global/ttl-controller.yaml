{{- if dig "ttl-controller" "enabled" false .Values.AsMap -}}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ttl-controller
  namespace: kube-system
  labels: {{- include "common.labels.standard" $ | nindent 4 }}
    app.kubernetes.io/component: ttl-controller
spec:
  chart:
    spec: {{- include "base-cluster.helm.chartSpec" (dict "repo" "twin" "chart" "k8s-ttl-controller" "context" $) | nindent 6 }}
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    priorityClassName: cluster-components
    image:
      repository: {{ printf "%s/twin/k8s-ttl-controller" ($.Values.global.imageRegistry | default "ghcr.io") }}
    resources:
      limits:
        memory: 1Gi
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |
              - op: remove
                path: /spec/template/spec/dnsPolicy
              - op: add
                path: /spec/template/spec/securityContext
                value:
                  runAsNonRoot: true
                  runAsUser: 65534
                  runAsGroup: 65534
                  fsGroup: 65534
                  seccompProfile:
                    type: RuntimeDefault
              - op: add
                path: /spec/template/spec/containers/0/securityContext
                value:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsGroup: 65534
{{- end -}}
