{{- if and .Values.monitoring.prometheus.enabled .Values.monitoring.tracing.enabled -}}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: telemetry-gateway
  namespace: monitoring
  labels: {{- include "common.labels.standard" $ | nindent 4 }}
    app.kubernetes.io/component: alloy
    app.kubernetes.io/part-of: monitoring
spec:
  chart:
    spec: {{- include "base-cluster.helm.chartSpec" (dict "repo" "grafana" "chart" "alloy" "context" $) | nindent 6 }}
  interval: 1h
  driftDetection:
    mode: enabled
  install:
    timeout: 10m0s
    crds: Skip
  upgrade:
    timeout: 10m0s
    crds: Skip
  dependsOn:
    - name: kube-prometheus-stack
      namespace: monitoring
  values:
    fullnameOverride: telemetry-gateway
    global:
      {{- if .Values.global.imageRegistry }}
      image:
        registry: {{ $.Values.global.imageRegistry }}
      {{- end }}
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 473
        runAsGroup: 473
        fsGroup: 473
        seccompProfile:
          type: RuntimeDefault
    configReloader:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 473
        runAsGroup: 473
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
    alloy:
      enableReporting: false
      resources: {{- include "common.resources" .Values.monitoring.alloy.gateway | nindent 8 }}
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 473
        runAsGroup: 473
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      configMap:
        content: |
          logging {
            format = "json"
          }

          otelcol.receiver.otlp "default" {
            grpc {}

            output {
              traces = [otelcol.processor.tail_sampling.policies.input]
            }
          }

          tracing {
            sampling_fraction = 1.0
            write_to = [otelcol.processor.tail_sampling.policies.input]
          }

          otelcol.processor.tail_sampling "policies" {
            decision_wait = "30s"

            policy {
              name = "sample-erroring-traces"
              type = "status_code"
              status_code {
                status_codes = [ "ERROR" ]
              }
            }

            policy {
              name = "sample-long-traces"
              type = "latency"
              latency {
                threshold_ms = 200
              }
            }

            policy {
              name = "sample-random"
              type = "probabilistic"
              probabilistic {
                sampling_percentage = 0.1
              }
            }

            output {
              traces = [otelcol.processor.batch.default.input]
            }
          }

          otelcol.processor.batch "default" {
            output {
              traces = [otelcol.exporter.otlp.tempo.input]
            }
          }

          otelcol.exporter.otlp "tempo" {
            client {
              endpoint = "grafana-tempo:4317"

              tls {
                insecure = true
              }
            }
          }
      extraPorts:
        - name: metrics
          port: 8888
          protocol: TCP
          targetPort: 8888
        - name: otlp
          port: 4317
          appProtocol: grpc
          protocol: TCP
          targetPort: 4317
    crds:
      create: false
    controller:
      type: deployment
      autoscaling:
        enabled: true
        minReplicas: 2
      priorityClassName: monitoring-components
    serviceMonitor:
      enabled: true
      additionalLabels:
        monitoring/provisioned-by: base-cluster
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: telemetry-gateway
            patch: |-
              - op: add
                path: /spec/template/spec/securityContext
                value:
                  runAsNonRoot: true
                  runAsUser: 473
                  runAsGroup: 473
                  fsGroup: 473
                  seccompProfile:
                    type: RuntimeDefault
              - op: add
                path: /spec/template/spec/containers/1/securityContext
                value:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  runAsNonRoot: true
                  runAsUser: 473
                  runAsGroup: 473
                  readOnlyRootFilesystem: true
                  seccompProfile:
                    type: RuntimeDefault
{{- end -}}
