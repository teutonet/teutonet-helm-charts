{{- define "base-cluster.prometheus-stack.kube-state-metrics.config" -}}
  {{- if .Values.global.imageRegistry }}
image:
  registry: {{ .Values.global.imageRegistry }}
  {{- end }}
resources: {{- include "common.resources" .Values.monitoring.prometheus.kubeStateMetrics | nindent 2 }}
  {{- $metricLabelsAllowList := list -}}
  {{- range $resource, $labels := .Values.monitoring.prometheus.kubeStateMetrics.metricLabelsAllowList -}}
    {{- $metricLabelsAllowList = append $metricLabelsAllowList (printf "%s=[%s]" $resource ($labels | join ",") ) -}}
  {{- end }}
extraArgs:
  - --metric-labels-allowlist={{- $metricLabelsAllowList | join "," }}
priorityClassName: monitoring-components
rbac:
  extraRules:
    - apiGroups:
        - helm.toolkit.fluxcd.io
        - image.toolkit.fluxcd.io
        - kustomize.toolkit.fluxcd.io
        - notification.toolkit.fluxcd.io
        - source.toolkit.fluxcd.io
      resources:
        - buckets
        - gitrepositories
        - helmcharts
        - helmreleases
        - helmrepositories
        - imagepolicies
        - imagerepositories
        - imageupdateautomations
        - kustomizations
        - ocirepositories
        - receivers
      verbs:
        - list
        - watch
customResourceState:
  enabled: true
  config:
    spec:
      {{- $imagePolicyVersion := "" -}}
      {{- $types := dict
        "Bucket" "source"
        "GitRepository" "source"
        "HelmChart" "source"
        "HelmRelease" "helm"
        "HelmRepository" "source"
        "ImagePolicy" "image"
        "ImageRepository" "image"
        "ImageUpdateAutomation" "image"
        "Kustomization" "kustomize"
        "OCIRepository" "source"
        "Receiver" "notification"
      -}}

      {{- $resources := list -}}
      {{- range $fluxKind, $fluxGroup := $types -}}
        {{- $crdPlural := regexReplaceAll "$" (regexReplaceAll "y$" ($fluxKind | lower) "ie") "s" -}}
        {{- $group := printf "%s.toolkit.fluxcd.io" $fluxGroup -}}
        {{- $crd := lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" (printf "%s.%s" $crdPlural $group) -}}
        {{- if $crd -}}
          {{- $version := "" -}}
          {{- range $version := $crd.spec.versions -}}
            {{- if $version.storage -}}
              {{- $version = $version.name -}}
              {{- if eq $fluxKind "ImagePolicy" -}}
                {{- $imagePolicyVersion = $version -}}
              {{- end -}}
            {{- end -}}
          {{- end -}}
          {{- $resources = append $resources (dict
                "groupVersionKind" (dict
                  "group" $group
                  "kind" $fluxKind
                  "version" $version
                )
                "metricNamePrefix" "gotk"
                "metrics" (list
                  (dict
                    "name" "reconcile_condition_gauge"
                    "help" (printf "The current conditions of a Flux %s resource." $fluxKind)
                    "each" (dict
                      "type" "Gauge"
                      "gauge" (dict
                        "path" (list "status" "conditions")
                        "labelsFromPath" (dict
                          "type" (list "type")
                        )
                        "valueFrom" (list "status")
                      )
                    )
                    "labelsFromPath" (dict
                      "customresource_namespace" (list "metadata" "namespace")
                      "customresource_name" (list "metadata" "name")
                    )
                  )
                  (dict
                    "name" "reconcile_suspended_gauge"
                    "help" (printf "The reconciliation suspended status of a Flux %s resource." $fluxKind)
                    "each" (dict
                      "type" "Gauge"
                      "gauge" (dict
                        "path" (list "spec" "suspend")
                        "nilIsZero" true
                      )
                    )
                    "labelsFromPath" (dict
                      "customresource_namespace" (list "metadata" "namespace")
                      "customresource_name" (list "metadata" "name")
                    )
                  )
                )
              )
          -}}
        {{- end -}}
      {{- end -}}

      {{- $resources = append $resources (dict
            "groupVersionKind" (dict
              "group" "image.toolkit.fluxcd.io"
              "kind" "ImagePolicy"
              "version" $imagePolicyVersion
            )
            "metricNamePrefix" "image_policy"
            "metrics" (list
              (dict
                "name" "latest_version"
                "help" "The latest version of the image as determined by the ImagePolicy."
                "each" (dict
                  "type" "Info"
                  "info" (dict
                    "labelsFromPath" (dict
                      "tag" (list "status" "latestRef" "tag")
                    )
                  )
                )
                "labelsFromPath" (dict
                  "customresource_namespace" (list "metadata" "namespace")
                  "customresource_name" (list "metadata" "name")
                )
              )
            )
          )
      }}
      resources: {{- toYaml $resources | nindent 8 }}
podAnnotations:
  checksum/config: {{ toYaml $resources | sha256sum | quote }}
securityContext:
  enabled: true
  seccompProfile:
    type: RuntimeDefault
  runAsNonRoot: true
containerSecurityContext: {{- include "base-cluster.prometheus-stack.containerSecurityContext" (dict) | nindent 2 }}
prometheus:
  monitor:
    additionalLabels:
      monitoring/provisioned-by: base-cluster
{{- end -}}
